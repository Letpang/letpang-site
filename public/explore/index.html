<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <base href="/explore/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>이애주, 바람의 형상, 흩어지지 않는 춤</title>

  <!-- Nanum Myeongjo 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">

  <!-- Pretendard 폰트 (로컬 포함 - 오프라인 환경 지원) -->
  <style>
    @font-face {
      font-family: 'Pretendard';
      font-weight: 800;
      font-display: swap;
      src: local('Pretendard ExtraBold'),
           url('fonts/Pretendard-ExtraBold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Pretendard';
      font-weight: 700;
      font-display: swap;
      src: local('Pretendard Bold'),
           url('fonts/Pretendard-Bold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Pretendard';
      font-weight: 400;
      font-display: swap;
      src: local('Pretendard Regular'),
           url('fonts/Pretendard-Regular.woff2') format('woff2');
    }
  </style>

  <!-- Three.js r128 (안정 버전) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <!-- CSS2DRenderer -->
  <!-- CSS2DRenderer: overflow:hidden → visible 패치 적용 버전 (가장자리 사진 잘림 방지) -->
  <script src="three/CSS2DRenderer.js"></script>

  <!-- 사진 데이터 -->
  <script src="photos.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      --orange: #8b2020;
      --black: #000000;
      --white: #FFFFFF;
    }

    html, body {
      width: 100%;
      height: 100%;
      /* overflow: hidden 제거 → 사진이 화면 밖으로 나가도 잘리지 않음 */
      overflow: visible;
      background: #f4f1ea;
      font-family: var(--font);
      cursor: grab;
      /* iOS Safari 안전 영역 대응 */
      padding-bottom: env(safe-area-inset-bottom);
    }

    body.dragging { cursor: grabbing; }

    /* 탐색 컨테이너 */
    #explore-container {
      position: fixed;
      inset: 0;
      touch-action: none; /* 터치 스크롤 방지 - OrbitControls가 처리 */
      /* overflow: visible 유지 - 사진이 컨테이너 밖으로 나가도 잘리지 않음 */
      overflow: visible;
    }

    #explore-container canvas {
      position: absolute;
      top: 0; left: 0;
    }

    /* 각 사진 아이템 */
    .explore-item {
      display: block;
      cursor: pointer;
      pointer-events: all;
      transition: opacity 0.35s ease;
      /* 깜빡임 방지 최적화 */
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform;
      transform-style: preserve-3d;
      transform: translateZ(0);
    }

    .explore-item.inactive {
      opacity: 0.15;
      pointer-events: none;
    }

    .explore-item img {
      display: block;
      width: 100%;
      /* 세로로 긴 사진이 화면 밖으로 나가지 않도록 최대 높이 제한 */
      /* CSS2DObject는 translate(-50%,-50%)로 중심 배치하므로 사진 높이의 절반이 위아래로 나갈 수 있음 */
      max-height: 280px;
      object-fit: contain;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      /* 송도 약간 밝게 - 밀도감 완화 */
      filter: saturate(0.82) brightness(1.06);
      border-radius: 2px;
    }

    /* 호버 글로우는 JS에서 처리 (depth filter와 충돌 방지) */

    /* 네비게이션 숨김 */
    #nav { display: none; }


    /* 드래그 안내 */
    #instructions {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    body.instructions-open #instructions { opacity: 1; }

    #instructions p {
      font-size: clamp(11px, 2.5vw, 14px);
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--orange);
      background: rgba(255,255,255,0.9);
      padding: clamp(6px, 1.5vw, 10px) clamp(12px, 3vw, 20px);
      white-space: nowrap;
    }

    /* ── 중앙 모달 오버레이 ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      padding: clamp(8px, 3vw, 20px);
    }

    #modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #modal-box {
      position: relative;
      background: var(--white);
      width: min(860px, 100%);
      max-height: min(90vh, 700px);
      overflow: hidden;
      display: flex;
      flex-direction: row;
      gap: 0;
      transform: translateY(24px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #modal-overlay.open #modal-box {
      transform: translateY(0) scale(1);
    }

    /* 왼쪽: 이미지 */
    #modal-img-wrap {
      flex: 0 0 45%;
      background: #fff;
      overflow: hidden;
      position: relative;
      min-height: clamp(200px, 40vh, 500px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modal-img-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }

    /* 오른쪽: 텍스트 */
    #modal-text {
      flex: 1;
      padding: clamp(20px, 4vw, 36px) clamp(16px, 3.5vw, 32px);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #modal-era {
      font-size: clamp(10px, 1.8vw, 12px);
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: clamp(6px, 1.5vw, 10px);
    }

    #modal-title {
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 800;
      color: var(--black);
      line-height: 1.3;
      margin-bottom: clamp(4px, 1vw, 6px);
      word-break: keep-all;
    }

    #modal-subtitle {
      font-size: clamp(12px, 2vw, 14px);
      font-weight: 500;
      color: #555;
      margin-bottom: clamp(12px, 3vw, 20px);
      line-height: 1.5;
    }

    #modal-desc {
      font-size: clamp(11px, 1.8vw, 13px);
      color: #333;
      line-height: 1.8;
      flex: 1;
      word-break: keep-all;
    }

    #modal-meta {
      margin-top: clamp(14px, 3vw, 24px);
      padding-top: clamp(12px, 2.5vw, 18px);
      border-top: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: clamp(4px, 1vw, 6px);
    }

    .meta-row {
      display: flex;
      gap: clamp(6px, 1.5vw, 10px);
      font-size: clamp(10px, 1.6vw, 12px);
    }

    .meta-label {
      color: #aaa;
      font-weight: 600;
      min-width: clamp(36px, 6vw, 48px);
      flex-shrink: 0;
    }

    .meta-value {
      color: #555;
    }

    /* 닫기 버튼 */
    #modal-close {
      position: absolute;
      top: clamp(10px, 2vw, 14px);
      right: clamp(12px, 2.5vw, 16px);
      background: none;
      border: none;
      cursor: pointer;
      font-size: clamp(20px, 4vw, 24px);
      line-height: 1;
      color: #888;
      z-index: 10;
      padding: 4px 8px;
      transition: color 0.2s;
      /* 터치 타겟 최소 44px */
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modal-close:hover { color: var(--black); }

    /* ── 모바일 (세로 레이아웃) ── */
    @media (max-width: 600px) {
      #modal-box {
        flex-direction: column;
        width: 100%;
        max-height: min(92vh, 650px);
      }

      #modal-img-wrap {
        flex: 0 0 auto;
        min-height: 0;
        height: clamp(160px, 35vw, 260px);
      }

      #modal-text {
        flex: 1;
        overflow-y: auto;
      }
    }

    /* ── 태블릿 (가로 레이아웃 유지, 크기 조정) ── */
    @media (min-width: 601px) and (max-width: 900px) {
      #modal-box {
        max-height: min(85vh, 560px);
      }

      #modal-img-wrap {
        flex: 0 0 40%;
        min-height: clamp(180px, 35vh, 400px);
      }
    }

    /* ── 상단 헤더 (텍스트 영역만 블러) ── */
    .art-header {
      position: fixed;
      top: 0;
      left: 0;
      width: fit-content;
      padding: 20px 40px 20px;
      z-index: 2000;
      display: flex;
      align-items: flex-start;
      gap: 15px;
      background: none;
      pointer-events: none;
    }

    .art-header::before { display: none; }

    .text-blur-wrapper { display: contents; }
    .title-group { display: flex; flex-direction: column; }

    .main-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2.6rem;
      color: #1a1a1a;
      margin: 0;
      letter-spacing: -0.02rem;
      font-weight: 700;
      line-height: 1.1;
      text-shadow:
        0 0 6px rgba(244, 241, 234, 1),
        0 0 12px rgba(244, 241, 234, 1),
        0 0 20px rgba(244, 241, 234, 0.9),
        0 0 36px rgba(244, 241, 234, 0.7);
    }

    .sub-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #8b2020;
      margin: 8px 0 0 2px;
      letter-spacing: 0.2rem;
      text-shadow:
        0 0 6px rgba(244, 241, 234, 1),
        0 0 12px rgba(244, 241, 234, 1),
        0 0 20px rgba(244, 241, 234, 0.9),
        0 0 36px rgba(244, 241, 234, 0.7);
    }

    .seal {
      margin-top: 8px;
      width: 34px;
      height: 34px;
      background-color: #b22222;
      color: #f4f1ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: serif;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 2px;
      box-shadow:
        1px 1px 3px rgba(0,0,0,0.2),
        0 0 8px rgba(244, 241, 234, 1),
        0 0 16px rgba(244, 241, 234, 1),
        0 0 28px rgba(244, 241, 234, 0.9),
        0 0 44px rgba(244, 241, 234, 0.7);
      transform: rotate(-5deg);
      user-select: none;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav id="nav" style="display:none"></nav>

  <!-- 좌상단 헤더 -->
  <div class="art-header">
    <div class="text-blur-wrapper">
      <div class="title-group">
        <h1 class="main-title">이애주, 바람의 형상</h1>
        <p class="sub-title">흩어지지 않는 춤 100선</p>
      </div>
      <div class="seal">舞</div>
    </div>
  </div>

  <!-- 드래그 안내 -->
  <div id="instructions">
    <p>클릭하고 드래그하여 탐색하세요</p>
  </div>

  <!-- 탐색 컨테이너 -->
  <div id="explore-container"></div>

  <!-- 중앙 모달 -->
  <div id="modal-overlay">
    <div id="modal-box">
      <button id="modal-close" aria-label="닫기">×</button>
      <div id="modal-img-wrap">
        <img id="modal-img" src="" alt="" />
      </div>
      <div id="modal-text">
        <div id="modal-era"></div>
        <div id="modal-title"></div>
        <div id="modal-subtitle"></div>
        <div id="modal-desc"></div>
        <div id="modal-meta"></div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const IMAGES_THUMB_DIR  = 'images/thumbs/'; // 콜라주용 썸네일 (300px)
    const IMAGES_MID_DIR    = 'images/mid/';    // 모달용 중간 크기 (800px)

    // 뷰포트 크기 기준 분기
    const IS_LARGE   = window.matchMedia('(min-width: 1024px)').matches;
    const IS_MOBILE  = window.matchMedia('(max-width: 600px)').matches;
    const IS_TABLET  = !IS_LARGE && !IS_MOBILE;

    // ── Three.js 초기화 ──────────────────────────────────────────────────────
    const container = document.getElementById('explore-container');
    let W = window.innerWidth;
    let H = window.innerHeight;

    const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 1, 10000);
    // 카메라 거리를 너무 멀리(100,000+) 배치하면 부동소수점 정밀도 문제로 사파리 등에서 사진이 흔들릴 수 있음
    // 2,000~5,000 정도면 충분히 멀리서 전체를 조망 가능
    camera.position.set(2000, 2000, 2000);
    camera.lookAt(0, 0, 0);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf4f1ea); // 한지색 배경

    // WebGL 렌더러
    const renderer = new THREE.WebGLRenderer({
      antialias: false,
      powerPreference: 'high-performance',
      alpha: false
    });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
    container.appendChild(renderer.domElement);

    // CSS2D 렌더러
    const labelRenderer = new THREE.CSS2DRenderer();
    // 컨테이너가 뷰포트보다 160% 크므로 렌더러도 동일하게 설정
    labelRenderer.setSize(W, H);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.overflow = 'visible';
    container.appendChild(labelRenderer.domElement);

    // ── OrbitControls ─────────────────────────────────────────────────────────
    // 참조 사이트와 동일: rotateSpeed 0.05, autoRotateSpeed 0.07(데스크톱) / 0.12(모바일)
    const controls = new THREE.OrbitControls(camera, labelRenderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enablePan      = false;
    controls.enableDamping  = false;
    controls.enableZoom     = false;
    controls.autoRotate     = true;

    if (IS_MOBILE) {
      controls.rotateSpeed    = 0.12;
      controls.autoRotateSpeed = 0.45;
    } else if (IS_TABLET) {
      controls.rotateSpeed    = 0.08;
      controls.autoRotateSpeed = 0.36;
    } else {
      controls.rotateSpeed    = 0.05;
      controls.autoRotateSpeed = 0.27;
    }

    // ── 드래그 안내 ──────────────────────────────────────────────────────────
    const COOKIE_KEY = 'aeju-seen';
    function getCookie(n) { const m = document.cookie.match(new RegExp('(?:^|; )' + n + '=([^;]*)')); return m ? m[1] : null; }
    function setCookie(n, v, d) { const e = new Date(Date.now() + d*86400000).toUTCString(); document.cookie = n + '=' + v + '; expires=' + e + '; path=/'; }

    if (!getCookie(COOKIE_KEY)) {
      setTimeout(() => document.body.classList.add('instructions-open'), 100);
      controls.addEventListener('start', () => { document.body.classList.remove('instructions-open'); setCookie(COOKIE_KEY,'1',1); });
      setTimeout(() => { document.body.classList.remove('instructions-open'); setCookie(COOKIE_KEY,'1',1); }, 4000);
    }

    // ── 사진 배치 ────────────────────────────────────────────────────────────
    const blocks = [];
    // SPREAD: 참조 사이트와 동일하게 뷰포트 크기 기반
    // 참조 사이트: Math.random() * window.innerWidth → ±innerWidth/2 범위
    const SPREAD = IS_MOBILE ? W * 0.8 : IS_TABLET ? W * 0.9 : W;

    // 사진 크기: 참조 사이트와 동일한 renderW 원본값 사용
    // (photos.js의 renderW 분포가 참조 사이트와 동일: min 51, median 170, max 298)
    function getItemWidth(renderW) {
      const base = renderW || 150;
      if (IS_MOBILE) {
        return Math.round(Math.max(21, Math.min(90, base * 0.30)));
      } else if (IS_TABLET) {
        return Math.round(Math.max(27, Math.min(150, base * 0.49)));
      } else {
        // 데스크톱: 25% 축소
        return Math.round(Math.min(165, base * 0.615));
      }
    }

    // 시드 기반 의사난수 (매 로드마다 동일 배치)
    let seed = 42;
    function rand() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; }

    // ── 균등 배열: 크기(S/M/L) × 밝기(어/중/밝) 9그룹 라운드로빈 순서 ──
    // 크기: 소(renderW≤100) 중(101~160) 대(>160)
    // 밝기: 어두움(≤73) 중간(74~124) 밝음(≥125)  — jimp 픽셀 샘플링 기준
    // 그룹별: 소+어(7) 소+중(8) 소+밝(5) / 중+어(9) 중+중(10) 중+밝(8) / 대+어(17) 대+중(20) 대+밝(16)
    const ORDERED_IDS = [41,9,21,4,1,14,3,2,16,49,10,33,38,24,35,6,5,18,50,27,53,42,25,52,7,15,19,80,32,78,45,28,55,8,17,23,81,40,88,46,29,56,11,20,30,86,72,51,34,63,12,26,47,87,76,58,48,79,13,31,61,99,71,54,96,22,37,66,85,57,36,43,67,64,39,44,68,59,62,69,60,65,70,82,73,74,83,77,75,84,89,90,92,91,100,98,93,94,95,97];
    const photoMap = {};
    PHOTOS.forEach(p => photoMap[p.id] = p);
    const orderedPhotos = ORDERED_IDS.map(id => photoMap[id]).filter(Boolean);

    // 공간을 10×10 격자로 나눠 각 셀에 사진 1장씩 배치 → 균등 분포 보장
    // y 범위에 패딩을 추가하여 사진이 화면 위아래로 잘리지 않도록
    // 최대 사진 높이 약 200px → 위아래 각 100px 패딩 필요
    const IMG_PAD_Y = 160; // 사진 절반 높이(최대 ~150px) + 여유
    const GRID_COLS = 10;
    const GRID_ROWS = 10;
    const cellW = SPREAD / GRID_COLS;
    const cellH = (H - IMG_PAD_Y * 2) / GRID_ROWS; // 패딩 제외한 높이로 셀 계산
    const gridCells = [];
    for (let row = 0; row < GRID_ROWS; row++) {
      for (let col = 0; col < GRID_COLS; col++) {
        gridCells.push({ col, row });
      }
    }
    // 격자 순서를 시드 기반으로 섞기 (균등하되 랜덤)
    for (let i = gridCells.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [gridCells[i], gridCells[j]] = [gridCells[j], gridCells[i]];
    }

    orderedPhotos.forEach(function (photo, idx) {
      // 격자 셀 기반 배치 (셀 내 ±40% 오프셋)
      const cell = gridCells[idx % gridCells.length];
      const x = (cell.col / GRID_COLS - 0.5) * SPREAD + (rand() - 0.5) * cellW * 0.8;
      // y: 패딩 범위 내에서만 배치 (-H/2+IMG_PAD_Y ~ +H/2-IMG_PAD_Y)
      const yRange = H - IMG_PAD_Y * 2;
      const y = (cell.row / GRID_ROWS - 0.5) * yRange + (rand() - 0.5) * cellH * 0.8;
      const z = (rand() - 0.5) * SPREAD;

      const item = document.createElement('a');
      item.className = 'explore-item';
      item.href = '#';
      item.dataset.id = photo.id;

      const itemW = getItemWidth(photo.renderW);
      item.style.width = itemW + 'px';

      const img = document.createElement('img');
      img.src     = IMAGES_THUMB_DIR + photo.filename;
      img.alt     = photo.title || photo.slug;
      // loading='lazy' 제거: 3D 월드에서 움직이는 DOM 요소의 지연 로딩은 깜빡임을 유발할 수 있음
      img.decoding = 'async';
      img.style.width  = '100%';
      img.style.height = 'auto';
      item.appendChild(img);

      // 클릭/터치 이벤트 (드래그와 탭 구분)
      let startX, startY, isDragging = false;
      const DRAG_THRESHOLD = IS_MOBILE ? 8 : 5;

      item.addEventListener('pointerdown', e => {
        startX = e.clientX; startY = e.clientY;
        isDragging = false;
        e.stopPropagation();
      });

      item.addEventListener('pointermove', e => {
        if (startX === undefined) return;
        if (Math.abs(e.clientX - startX) > DRAG_THRESHOLD ||
            Math.abs(e.clientY - startY) > DRAG_THRESHOLD) isDragging = true;
      });

      item.addEventListener('pointerup', e => {
        e.stopPropagation();
        if (!isDragging) { e.preventDefault(); openModal(photo); }
        startX = undefined; isDragging = false;
      });

      item.addEventListener('click', e => e.preventDefault());

      const obj = new THREE.CSS2DObject(item);
      obj.position.set(x, y, z);
      scene.add(obj);

      blocks.push({ el: item, obj, photo, x, y, z });
    });

    // ── 중앙 모달 ────────────────────────────────────────────────────────────
    const overlay    = document.getElementById('modal-overlay');
    const modalImg   = document.getElementById('modal-img');
    const modalEra   = document.getElementById('modal-era');
    const modalTitle = document.getElementById('modal-title');
    const modalSub   = document.getElementById('modal-subtitle');
    const modalDesc  = document.getElementById('modal-desc');
    const modalMeta  = document.getElementById('modal-meta');
    const modalClose = document.getElementById('modal-close');

    function openModal(photo) {
      blocks.forEach(b => b.el.classList.add('inactive'));

      modalImg.src = IMAGES_MID_DIR + photo.filename;
      modalImg.alt = photo.title || photo.slug;

      modalEra.textContent   = photo.era   || '';
      modalTitle.textContent = photo.title || photo.slug;
      modalSub.textContent   = photo.subtitle || '';
      modalDesc.textContent  = photo.desc  || '';

      const metaItems = [];
      if (photo.date)     metaItems.push(['날짜', photo.date]);
      if (photo.place)    metaItems.push(['장소', photo.place]);
      if (photo.keywords) metaItems.push(['키워드', photo.keywords]);

      modalMeta.innerHTML = metaItems.map(([l, v]) =>
        `<div class="meta-row"><span class="meta-label">${l}</span><span class="meta-value">${v}</span></div>`
      ).join('');

      overlay.classList.add('open');
      controls.autoRotate = false;

      const url = new URL(window.location.href);
      url.searchParams.set('photo', photo.slug);
      window.history.pushState({ slug: photo.slug }, '', url.toString());
    }

    function closeModal() {
      overlay.classList.remove('open');
      blocks.forEach(b => b.el.classList.remove('inactive'));
      controls.autoRotate = true;

      const url = new URL(window.location.href);
      url.searchParams.delete('photo');
      window.history.pushState({}, '', url.toString());
    }

    modalClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    window.addEventListener('popstate', () => {
      if (!new URL(window.location.href).searchParams.get('photo')) closeModal();
    });

    // ── 드래그 커서 ──────────────────────────────────────────────────────────
    container.addEventListener('mousedown', () => document.body.classList.add('dragging'));
    window.addEventListener('mouseup', () => document.body.classList.remove('dragging'));

    const HOVER_FILTER = 'drop-shadow(0 0 6px rgba(255,248,220,1)) drop-shadow(0 0 18px rgba(255,220,160,0.75)) drop-shadow(0 0 36px rgba(200,160,80,0.4))';

    // ── 깊이 기반 밝기: 4단계 (opacity=1 고정 → 겹칠 때 뒷 사진 완전히 가림) ──
    // brightness로 깊이 표현: 앞 1.0 → 0.85 → 0.70 → 뒤 0.55
    function updateDepth() {
      const camPos = camera.position;
      let minDist = Infinity, maxDist = -Infinity;

      blocks.forEach(b => {
        const d = camPos.distanceTo(b.obj.position);
        if (d < minDist) minDist = d;
        if (d > maxDist) maxDist = d;
      });

      const range = maxDist - minDist || 1;

      blocks.forEach(b => {
        b.el.style.opacity = '1'; // 항상 불투명 → 겹치면 앞 사진만 보임

        if (b.el.matches(':hover')) {
          b.el.style.filter = HOVER_FILTER;
          return;
        }

        const d = camPos.distanceTo(b.obj.position);
        const t = (d - minDist) / range; // 0=가장 가까운, 1=가장 먼
        const level = Math.min(3, Math.floor(t * 4)); // 0,1,2,3
        const brightness = [1.0, 0.85, 0.70, 0.55][level];
        b.el.style.filter = `brightness(${brightness})`;
      });
    }

    // ── 렌더 루프 ────────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      updateDepth();
    }

    animate();

    // ── 초기 렌더링 후 화면 밖으로 나간 사진 위치 보정 ──────────────────────
    // CSS2DRenderer가 translate(-50%,-50%)로 중심 배치하므로
    // 사진 높이의 절반이 화면 위아래로 나갈 수 있음 → 클램핑으로 보정
    function clampPhotoPositions() {
      const vH = window.innerHeight;
      const MARGIN = 8; // 화면 가장자리 여유 px
      const items = document.querySelectorAll('.explore-item');
      items.forEach(item => {
        const r = item.getBoundingClientRect();
        const h = r.height;
        // 현재 transform에서 translate 값 파싱
        const tfm = item.style.transform;
        const match = tfm.match(/translate\(-50%,\s*-50%\)\s*translate\(([^,]+)px,\s*([^)]+)px\)/);
        if (!match) return;
        const tx = parseFloat(match[1]);
        let ty = parseFloat(match[2]);
        // 화면 위로 나가면 보정
        if (r.top < MARGIN) {
          ty += (MARGIN - r.top);
        }
        // 화면 아래로 나가면 보정 (단, 타이틀 영역 고려해 vH - 120 기준)
        const bottomLimit = vH - 120; // 하단 타이틀 영역 제외
        if (r.bottom > bottomLimit) {
          ty -= (r.bottom - bottomLimit);
        }
        item.style.transform = `translate(-50%, -50%) translate(${tx}px, ${ty}px)`;
      });
    }

    // clampPhotoPositions: CSS2DRenderer와 transform 충돌로 흔들림 발생 → 비활성화

    // ── CSS vw 방식: 글자가 화면 너비를 꽉 채우도록 font-size 자동 조정 ──────
    // 장평 scaleX=0.9, 장체 scaleY=1.3

    // ── 리사이즈 ─────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      W = window.innerWidth; H = window.innerHeight;
      camera.left = -W/2; camera.right = W/2;
      camera.top  =  H/2; camera.bottom = -H/2;
      camera.updateProjectionMatrix();
      renderer.setSize(W, H);
      labelRenderer.setSize(W, H);
      needsRender = true;
    });

    // ── URL 파라미터로 자동 열기 ─────────────────────────────────────────────
    const initSlug = new URL(window.location.href).searchParams.get('photo');
    if (initSlug) {
      const found = blocks.find(b => b.photo.slug === initSlug);
      if (found) setTimeout(() => openModal(found.photo), 600);
    }

  })();
  </script>
</body>
</html>
