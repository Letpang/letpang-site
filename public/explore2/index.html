<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <base href="/explore2/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이애주 춤 100선</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #f5f0e4;
      font-family: 'Pretendard', -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 한지 텍스처 + 베이지 색조 오버레이 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('hanji-texture.jpg');
      background-size: cover;
      background-position: center;
      mix-blend-mode: multiply;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 스테이지 ── */
    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      perspective: 1200px;
    }

    /* ── 사진 카드 (인화지 느낌) ── */
    .p-card {
      position: absolute;
      top: 0; left: 0;
      pointer-events: auto;
      will-change: transform;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow:
        2px 4px 8px  rgba(0, 0, 0, 0.18),
        10px 20px 40px rgba(0, 0, 0, 0.10);
      transition: box-shadow 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .p-card img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      -webkit-user-drag: none;
      transition: filter 0.3s ease, transform 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    /* 깊이감 */
    .p-card.depth-far img  { filter: saturate(0.70) brightness(0.82); }
    .p-card.depth-mid img  { filter: saturate(0.80) brightness(0.92); }
    .p-card.depth-near img { filter: saturate(0.90) brightness(0.98); }

    /* 한지 질감 융합 */
    .p-card.blend img { mix-blend-mode: multiply; opacity: 0.92; }

    /* hover: 그림자 없애고 후광만 */
    .p-card.hover {
      box-shadow: none !important;
      z-index: 999;
    }
    .p-card.hover img {
      filter: brightness(1.05) contrast(1.02) !important;
      mix-blend-mode: normal !important;
      transform: scale(1.0);
    }

    /* ── 좌상단 타이틀 ── */
    #title-overlay {
      position: fixed;
      top: clamp(16px, 3vw, 32px); left: clamp(16px, 3vw, 36px);
      z-index: 200;
      pointer-events: none;
    }
    #title-overlay h1 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: clamp(1.5rem, 6vw, 3rem);
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.2rem;
      line-height: 1.3;
      text-shadow:
        0 0 6px rgba(245, 240, 228, 1),
        0 0 12px rgba(245, 240, 228, 1),
        0 0 20px rgba(245, 240, 228, 0.9),
        0 0 36px rgba(245, 240, 228, 0.7);
    }
    #title-overlay p {
      font-family: 'Nanum Myeongjo', serif;
      margin-top: clamp(6px, 1.5vw, 10px);
      font-size: clamp(12px, 2.8vw, 15px);
      font-weight: 700;
      color: #8b2020;
      letter-spacing: clamp(0.05rem, 0.3vw, 0.1rem);
      text-shadow:
        0 0 6px rgba(245, 240, 228, 1),
        0 0 12px rgba(245, 240, 228, 1),
        0 0 20px rgba(245, 240, 228, 0.9),
        0 0 36px rgba(245, 240, 228, 0.7);
    }

    /* ── 힌트 텍스트 ── */
    #hint {
      position: fixed;
      top: clamp(14px, 2.5vw, 28px); right: clamp(16px, 3vw, 32px);
      z-index: 300;
      font-size: 11px;
      font-weight: 400;
      color: rgba(61, 47, 34, 0.38);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    #hint.hidden { opacity: 0; }

    /* ── 모달 ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: clamp(8px, 3vw, 20px);
    }
    #modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    #modal-box {
      position: relative;
      background: #fff;
      width: min(820px, 100%);
      max-height: min(88vh, 680px);
      overflow: hidden;
      display: flex;
      transform: scale(0.95) translateY(20px);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #modal-overlay.open #modal-box { transform: scale(1) translateY(0); }

    #modal-img-wrap {
      flex: 0 0 44%;
      background: #111;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }
    #modal-img-wrap img {
      display: block;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #modal-text {
      flex: 1;
      padding: clamp(20px, 4vw, 36px) clamp(16px, 3.5vw, 30px);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #modal-era {
      font-size: clamp(10px, 2vw, 11px);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #7a4a2a;
      text-transform: uppercase;
      margin-bottom: clamp(6px, 1.5vw, 10px);
    }
    #modal-title {
      font-size: clamp(15px, 2.8vw, 20px);
      font-weight: 700;
      color: #111;
      line-height: 1.35;
      margin-bottom: 6px;
      word-break: keep-all;
    }
    #modal-subtitle {
      font-size: clamp(12px, 2.2vw, 13px);
      font-weight: 400;
      color: #666;
      margin-bottom: clamp(12px, 3vw, 18px);
      line-height: 1.5;
    }
    #modal-desc {
      font-size: clamp(12px, 2.2vw, 13px);
      color: #444;
      line-height: 1.85;
      flex: 1;
      word-break: keep-all;
    }
    #modal-meta {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .meta-row { display: flex; gap: 8px; font-size: clamp(10px, 2vw, 11px); }
    .meta-label { color: #bbb; font-weight: 600; min-width: 40px; flex-shrink: 0; letter-spacing: 0.06em; }
    .meta-value { color: #555; }
    #modal-close {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none; cursor: pointer;
      font-size: 22px; line-height: 1; color: #aaa;
      padding: 6px 10px;
      transition: color .2s;
    }
    #modal-close:hover { color: #111; }

    @media (max-width: 640px) {
      #modal-box { flex-direction: column; }
      #modal-img-wrap { flex: 0 0 auto; min-height: clamp(100px, 30vw, 160px); max-height: 38vh; }
    }

    /* ── 터치 디바이스 ── */
    @media (hover: none) {
      body { cursor: auto !important; }
      /* mix-blend-mode는 모바일에서 GPU 과부하 → 화면 뿌얘짐 방지 */
      body::before { mix-blend-mode: normal; opacity: 0.35; }
      .p-card.blend img { mix-blend-mode: normal; }
    }

    /* ── 로딩 ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #f5f0e4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      transition: opacity 1s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 700;
      color: rgba(80, 55, 30, 0.6);
      letter-spacing: 0.28em;
      margin-bottom: 28px;
    }
    .load-bar {
      width: 120px; height: 1px;
      background: rgba(122, 74, 42, 0.15);
      overflow: hidden;
    }
    .load-bar-inner {
      height: 100%;
      background: #7a4a2a;
      animation: lb 1.4s ease-in-out infinite;
    }
    @keyframes lb {
      0%   { width: 0%;  margin-left: 0; }
      50%  { width: 55%; margin-left: 22%; }
      100% { width: 0%;  margin-left: 100%; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div id="loading-title">이애주 춤 100선</div>
  <div class="load-bar"><div class="load-bar-inner"></div></div>
</div>

<div id="stage"></div>

<div id="title-overlay">
  <h1>이애주 춤 100선</h1>
  <p>바람의 형상, 흩어지지 않는 춤</p>
</div>

<div id="hint">move · click to scatter</div>

<!-- 모달 -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">×</button>
    <div id="modal-img-wrap"><img id="modal-img" src="" alt="" /></div>
    <div id="modal-text">
      <div id="modal-era"></div>
      <div id="modal-title"></div>
      <div id="modal-subtitle"></div>
      <div id="modal-desc"></div>
      <div id="modal-meta"></div>
    </div>
  </div>
</div>

<script src="photos.js"></script>
<script>
(function () {
  'use strict';

  const stage   = document.getElementById('stage');
  const hint    = document.getElementById('hint');
  const titleEl = document.getElementById('title-overlay');

  let W = window.innerWidth;
  let H = window.innerHeight;

  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  /* ─── 커서/포인터 위치 추적 (마우스·터치 통합) ─── */
  let mx = W / 2, my = H / 2;

  document.addEventListener('pointermove', e => {
    mx = e.clientX; my = e.clientY;
  });

  /* ─── 시드 랜덤 ─── */
  function makeRand(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967295; };
  }
  const rng = makeRand(314159);

  // ── 격자 기반 초기 배치 계산 ──
  const N     = PHOTOS.length;
  const COLS  = Math.ceil(Math.sqrt(N * W / H));
  const ROWS  = Math.ceil(N / COLS);
  const cellW = W / COLS;
  const cellH = H / ROWS;
  const gridIdx = Array.from({length: COLS * ROWS}, (_, i) => i);
  for (let i = gridIdx.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [gridIdx[i], gridIdx[j]] = [gridIdx[j], gridIdx[i]];
  }

  /* ════════════════════════════════════════════════
     모바일: 정적 배치 + 탭 → 바로 모달
  ════════════════════════════════════════════════ */
  if (isMobile) {
    hint.style.display = 'none';

    // 모바일 전용 grid: N장을 화면 안에 꽉 채움
    const M_COLS = Math.ceil(Math.sqrt(N * W / H));
    const M_ROWS = Math.ceil(N / M_COLS);
    const M_cellW = W / M_COLS;
    const M_cellH = H / M_ROWS;

    PHOTOS.forEach((photo, idx) => {
      const card = document.createElement('div');
      card.className = 'p-card';

      const img = document.createElement('img');
      img.src     = 'images/thumbs/' + photo.filename;
      img.alt     = photo.title || '';
      img.loading = 'lazy';
      card.appendChild(img);
      stage.appendChild(card);

      // 사진 크기: 셀 너비의 67.5~112.5% (겹침 허용, 1.5배 확대)
      const r_size = rng();
      const w = Math.round(M_cellW * (0.65 + r_size * 0.25));
      card.style.width = w + 'px';

      if (w < M_cellW * 0.72) card.classList.add('depth-far');
      else if (w < M_cellW * 0.82) card.classList.add('depth-mid');
      else card.classList.add('depth-near');

      // 셀 중심 기준 배치 — 셀 전체 높이 균등 분산
      const gi  = gridIdx[idx] || idx;
      const col = gi % M_COLS;
      const row = Math.floor(gi / M_COLS);
      const cx  = (col + 0.5) * M_cellW;
      const cy  = (row + 0.5) * M_cellH;
      const ox  = (rng() - 0.5) * M_cellW * 0.5;
      const oy  = (rng() - 0.5) * M_cellH * 0.5;
      const x0  = cx + ox;
      const y0  = cy + oy;
      const rot = (rng() - 0.5) * 18;

      card.style.transform = `translate(${(x0 - w/2).toFixed(1)}px,${(y0 - w/2).toFixed(1)}px) rotate(${rot}deg)`;

      // 탭 → 즉시 모달
      let ptStartX, ptStartY;
      card.addEventListener('pointerdown', (e) => {
        ptStartX = e.clientX; ptStartY = e.clientY;
      });
      card.addEventListener('pointerup', (e) => {
        if (Math.abs(e.clientX - ptStartX) < 10 &&
            Math.abs(e.clientY - ptStartY) < 10) {
          openModal(photo);
        }
      });
    });

  /* ════════════════════════════════════════════════
     데스크톱: 기존 물리 시뮬레이션 + featureCard 로직
  ════════════════════════════════════════════════ */
  } else {
    const particles = [];
    let featuredParticle = null;

    PHOTOS.forEach((photo, idx) => {
      const card = document.createElement('div');
      card.className = 'p-card';

      const img = document.createElement('img');
      img.src     = 'images/thumbs/' + photo.filename;
      img.alt     = photo.title || '';
      img.loading = 'lazy';
      img.onerror = () => { card.style.display = 'none'; p.hidden = true; };
      card.appendChild(img);
      stage.appendChild(card);

      const r_size = rng();
      const w = (r_size < 0.3 ? 40 + r_size * 80
               : r_size < 0.8 ? 65 + (r_size-0.3) * 60
               : 95 + (r_size-0.8) * 75);
      card.style.width = Math.round(w) + 'px';

      if (w < 58)       card.classList.add('depth-far');
      else if (w < 85)  card.classList.add('depth-mid');
      else              card.classList.add('depth-near');

      if (rng() < 0.20) card.classList.add('blend');

      const gi  = gridIdx[idx] || idx;
      const col = gi % COLS;
      const row = Math.floor(gi / COLS);
      const pad = 40;
      const x0  = pad + col * cellW + (rng() * 0.7 + 0.15) * (cellW - pad);
      const y0  = pad + row * cellH + (rng() * 0.7 + 0.15) * (cellH - pad);
      const rx  = (rng() - 0.5) * 4;
      const ry  = (rng() - 0.5) * 4;

      const p = {
        el: card, photo, w,
        x: x0, y: y0,
        vx: (rng() - 0.5) * 2,
        vy: (rng() - 0.5) * 2,
        rx, ry,
        rot: (rng() - 0.5) * 24,
        hovered: false, hidden: false,
      };
      particles.push(p);

      card.style.transform = `translate(${(p.x - p.w/2).toFixed(1)}px,${(p.y - 30).toFixed(1)}px) rotate(${p.rot}deg)`;

      card.addEventListener('pointerenter', () => {
        if (p.hidden || featuredParticle) return;
        card.classList.add('hover'); p.hovered = true;
      });
      card.addEventListener('pointerleave', () => {
        if (!p.featured) card.classList.remove('hover'); p.hovered = false;
      });

      function featureCard() {
        if (featuredParticle) returnToPhysics(featuredParticle);
        featuredParticle = p;
        p.featured = true;
        card.classList.add('hover');
        scatterOthers(p);
        const targetW = Math.min(400, W * 0.36);
        const scale   = targetW / p.w;
        const aspect  = photo.height / photo.width;
        const tx = W / 2 - p.w / 2;
        const ty = H / 2 - (p.w * aspect) / 2;
        img.src = 'images/mid/' + photo.filename;
        card.style.zIndex     = '900';
        card.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease';
        card.style.transform  = `translate(${tx.toFixed(1)}px,${ty.toFixed(1)}px) rotate(0deg) rotateX(0deg) rotateY(0deg) scale(${scale.toFixed(3)})`;
      }

      let cardPtStartX, cardPtStartY, cardDragging = false;
      card.addEventListener('pointerdown', (e) => {
        cardPtStartX = e.clientX; cardPtStartY = e.clientY;
        cardDragging = false; e.stopPropagation();
      });
      card.addEventListener('pointermove', (e) => {
        if (cardPtStartX === undefined) return;
        if (Math.abs(e.clientX - cardPtStartX) > 6 ||
            Math.abs(e.clientY - cardPtStartY) > 6) cardDragging = true;
      });
      card.addEventListener('pointerup', (e) => {
        e.stopPropagation();
        if (!cardDragging) {
          mx = e.clientX; my = e.clientY;
          if (p.featured) openModal(photo);
          else featureCard();
        }
        cardPtStartX = undefined; cardDragging = false;
      });
    });

    function returnToPhysics(p) {
      p.featured = false;
      p.el.classList.remove('hover');
      p.el.querySelector('img').src = 'images/thumbs/' + p.photo.filename;
      p.el.style.transition = 'transform 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
      setTimeout(() => { p.el.style.transition = ''; p.el.style.zIndex = ''; }, 460);
    }

    function scatterOthers(self) {
      particles.forEach(p => {
        if (p === self) return;
        const dx = p.x - mx, dy = p.y - my;
        const dist = Math.sqrt(dx*dx + dy*dy) + 0.1;
        const force = Math.max(12, Math.min(500 / dist, 36));
        p.vx += (dx / dist) * force + (Math.random() - 0.5) * 10;
        p.vy += (dy / dist) * force + (Math.random() - 0.5) * 10;
      });
    }

    let stagePtStartX, stagePtStartY, stageDragging = false;
    stage.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.p-card')) return;
      stagePtStartX = e.clientX; stagePtStartY = e.clientY;
      stageDragging = false; mx = e.clientX; my = e.clientY;
    });
    stage.addEventListener('pointermove', (e) => {
      if (stagePtStartX === undefined) return;
      mx = e.clientX; my = e.clientY;
      if (Math.abs(e.clientX - stagePtStartX) > 6 ||
          Math.abs(e.clientY - stagePtStartY) > 6) stageDragging = true;
      if (stageDragging) {
        particles.forEach(p => {
          if (p.featured || p.hidden) return;
          const dx = p.x - mx, dy = p.y - my;
          const dist = Math.sqrt(dx*dx + dy*dy) + 0.1;
          if (dist < 160) {
            const force = (160 - dist) / 160 * 3;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }
        });
      }
    });
    stage.addEventListener('pointerup', (e) => {
      if (e.target.closest('.p-card')) return;
      if (!stageDragging) {
        hint.classList.add('hidden');
        mx = e.clientX; my = e.clientY;
        if (featuredParticle) {
          returnToPhysics(featuredParticle);
          featuredParticle = null;
        } else {
          particles.forEach(p => {
            const dx = p.x - mx, dy = p.y - my;
            const dist = Math.sqrt(dx*dx + dy*dy) + 0.1;
            const force = Math.max(20, Math.min(700 / dist, 48));
            p.vx += (dx / dist) * force + (Math.random() - 0.5) * 14;
            p.vy += (dy / dist) * force + (Math.random() - 0.5) * 14;
          });
        }
      }
      stagePtStartX = undefined; stageDragging = false;
    });

    const DAMPING = 0.980, MAX_SPEED = 24, NOISE = 0.030, MARGIN = 120;

    function tick() {
      particles.forEach(p => {
        if (p.hidden || p.featured) return;
        const PAD = 50;
        if (p.x < PAD)      p.vx += (PAD - p.x)       * 0.06;
        if (p.x > W - PAD)  p.vx -= (p.x - (W - PAD)) * 0.06;
        if (p.y < PAD)      p.vy += (PAD - p.y)        * 0.06;
        if (p.y > H - PAD)  p.vy -= (p.y - (H - PAD)) * 0.06;
        p.vx += (Math.random() - 0.5) * NOISE;
        p.vy += (Math.random() - 0.5) * NOISE;
        const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        if (spd > MAX_SPEED) { p.vx = p.vx/spd*MAX_SPEED; p.vy = p.vy/spd*MAX_SPEED; }
        const damp = p.hovered ? 0.70 : DAMPING;
        p.vx *= damp; p.vy *= damp;
        p.x += p.vx; p.y += p.vy;
        if (p.x >  W + MARGIN) p.x = -MARGIN;
        if (p.x < -MARGIN)     p.x =  W + MARGIN;
        if (p.y >  H + MARGIN) p.y = -MARGIN;
        if (p.y < -MARGIN)     p.y =  H + MARGIN;
        p.el.style.transform =
          `translate(${(p.x - p.w/2).toFixed(1)}px,${(p.y - 30).toFixed(1)}px) rotate(${p.rot}deg) rotateX(${p.rx}deg) rotateY(${p.ry}deg)`;
      });
      requestAnimationFrame(tick);
    }

    tick();
  } // end desktop

  /* ─── 모달 ─── */
  const overlay    = document.getElementById('modal-overlay');
  const modalImg   = document.getElementById('modal-img');
  const modalEra   = document.getElementById('modal-era');
  const modalTitle = document.getElementById('modal-title');
  const modalSub   = document.getElementById('modal-subtitle');
  const modalDesc  = document.getElementById('modal-desc');
  const modalMeta  = document.getElementById('modal-meta');

  function openModal(photo) {
    // 썸네일 먼저 즉시 표시 → mid 로드 완료되면 교체
    modalImg.src           = 'images/thumbs/' + photo.filename;
    modalImg.alt           = photo.title || '';
    modalEra.textContent   = photo.era      || '';
    modalTitle.textContent = photo.title    || '';
    modalSub.textContent   = photo.subtitle || '';
    modalDesc.textContent  = photo.desc     || '';
    const rows = [];
    if (photo.date)  rows.push(['날짜', photo.date]);
    if (photo.place) rows.push(['장소', photo.place]);
    if (photo.era)   rows.push(['시대', photo.era]);
    modalMeta.innerHTML = rows.map(([l,v]) =>
      `<div class="meta-row"><span class="meta-label">${l}</span><span class="meta-value">${v}</span></div>`
    ).join('');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    // 백그라운드에서 mid 이미지 로드 후 교체
    const mid = new Image();
    mid.onload = () => { if (overlay.classList.contains('open')) modalImg.src = mid.src; };
    mid.src = 'images/mid/' + photo.filename;
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { modalImg.src = ''; }, 350);
  }

  const modalCloseBtn = document.getElementById('modal-close');
  modalCloseBtn.addEventListener('click', closeModal);
  // 모바일: touchstart로 즉시 반응 (click은 300ms 지연)
  modalCloseBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    closeModal();
  }, { passive: false });

  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  overlay.addEventListener('touchstart', (e) => {
    if (e.target === overlay) { e.preventDefault(); closeModal(); }
  }, { passive: false });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ─── 리사이즈 ─── */
  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
  });

  /* ─── 초기화 ─── */
  // 데스크톱은 위 else 블록 안에서 tick() 호출됨. 모바일은 정적 배치라 tick 불필요.
  const loading = document.getElementById('loading');
  setTimeout(() => {
    loading.classList.add('fade');
    setTimeout(() => loading.remove(), 800);
  }, 300);

  setTimeout(() => hint.classList.add('hidden'), 4000);

})();
</script>
</body>
</html>
